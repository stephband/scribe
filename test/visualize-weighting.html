<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Oscillator Weighting Comparison</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 20px 0; }
        .label { margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Current approach: Weight by phase (angle)</h2>
    <div class="label">weight = (cos(phase) + 1) / 2</div>
    <canvas id="phaseCanvas" width="800" height="300"></canvas>

    <h2>Alternative: Weight by phaseShift (absolute time offset)</h2>
    <div class="label">For different divisors with same timing error</div>
    <canvas id="phaseShiftCanvas" width="800" height="300"></canvas>

    <h2>Comparison: 0.1 beat timing error across divisors</h2>
    <canvas id="comparisonCanvas" width="800" height="300"></canvas>

    <script type="module">
        const { cos, sin, PI, exp, abs } = Math;

        // Current phase-based weighting
        function phaseWeight(phase) {
            return (cos(phase) + 1) / 2;
        }

        // Potential phaseShift-based weighting (exponential decay)
        function phaseShiftWeight(phaseShift, k = 5) {
            return exp(-abs(phaseShift) * k);
        }

        // Draw phase weighting graph
        const ctx1 = document.getElementById('phaseCanvas').getContext('2d');
        ctx1.fillStyle = '#f0f0f0';
        ctx1.fillRect(0, 0, 800, 300);

        ctx1.strokeStyle = '#000';
        ctx1.lineWidth = 2;
        ctx1.beginPath();
        for (let x = 0; x <= 800; x++) {
            const phase = (x / 800) * 2 * PI - PI;  // -π to π
            const weight = phaseWeight(phase);
            const y = 280 - weight * 260;
            if (x === 0) ctx1.moveTo(x, y);
            else ctx1.lineTo(x, y);
        }
        ctx1.stroke();

        // Draw axes and labels
        ctx1.strokeStyle = '#999';
        ctx1.lineWidth = 1;
        ctx1.beginPath();
        ctx1.moveTo(0, 280);
        ctx1.lineTo(800, 280);
        ctx1.moveTo(400, 0);
        ctx1.lineTo(400, 300);
        ctx1.stroke();

        ctx1.fillStyle = '#000';
        ctx1.fillText('-π', 10, 295);
        ctx1.fillText('0', 395, 295);
        ctx1.fillText('π', 780, 295);
        ctx1.fillText('weight=0', 10, 290);
        ctx1.fillText('weight=1', 10, 30);

        // Draw phaseShift weighting for different divisors
        const ctx2 = document.getElementById('phaseShiftCanvas').getContext('2d');
        ctx2.fillStyle = '#f0f0f0';
        ctx2.fillRect(0, 0, 800, 300);

        const colors = ['#e41a1c', '#377eb8', '#4daf4a', '#984ea3', '#ff7f00', '#ffff33', '#a65628', '#f781bf', '#999999'];
        const duration = 4;

        for (let divisor = 1; divisor <= 9; divisor++) {
            ctx2.strokeStyle = colors[divisor - 1];
            ctx2.lineWidth = 2;
            ctx2.beginPath();

            for (let x = 0; x <= 800; x++) {
                const timingError = (x / 800) * 0.5;  // 0 to 0.5 beats
                const weight = phaseShiftWeight(timingError);
                const y = 280 - weight * 260;
                if (x === 0) ctx2.moveTo(x, y);
                else ctx2.lineTo(x, y);
            }
            ctx2.stroke();

            // Label
            ctx2.fillStyle = colors[divisor - 1];
            ctx2.fillText(`div ${divisor}`, 720, 20 + divisor * 15);
        }

        // Axes
        ctx2.strokeStyle = '#999';
        ctx2.lineWidth = 1;
        ctx2.beginPath();
        ctx2.moveTo(0, 280);
        ctx2.lineTo(800, 280);
        ctx2.stroke();

        ctx2.fillStyle = '#000';
        ctx2.fillText('0 beats', 10, 295);
        ctx2.fillText('0.5 beats', 720, 295);

        // Comparison: for 0.1 beat error, how do divisors rank?
        const ctx3 = document.getElementById('comparisonCanvas').getContext('2d');
        ctx3.fillStyle = '#f0f0f0';
        ctx3.fillRect(0, 0, 800, 300);

        const timingError = 0.1;  // beats
        const barWidth = 70;
        const startX = 50;

        for (let divisor = 1; divisor <= 9; divisor++) {
            const cycleLength = duration / divisor;  // beats per cycle
            const phase = (timingError / cycleLength) * 2 * PI;
            const wrappedPhase = ((phase + PI) % (2 * PI)) - PI;  // Wrap to [-π, π]

            const weightPhase = phaseWeight(wrappedPhase);
            const weightShift = phaseShiftWeight(timingError);

            const x = startX + (divisor - 1) * (barWidth + 10);

            // Phase-based weight (blue)
            ctx3.fillStyle = '#377eb8';
            const h1 = weightPhase * 120;
            ctx3.fillRect(x, 260 - h1, 30, h1);

            // PhaseShift-based weight (red)
            ctx3.fillStyle = '#e41a1c';
            const h2 = weightShift * 120;
            ctx3.fillRect(x + 35, 260 - h2, 30, h2);

            // Label
            ctx3.fillStyle = '#000';
            ctx3.fillText(`${divisor}`, x + 25, 280);
        }

        // Legend
        ctx3.fillStyle = '#377eb8';
        ctx3.fillRect(50, 20, 20, 20);
        ctx3.fillStyle = '#000';
        ctx3.fillText('phase weight', 75, 35);

        ctx3.fillStyle = '#e41a1c';
        ctx3.fillRect(200, 20, 20, 20);
        ctx3.fillStyle = '#000';
        ctx3.fillText('phaseShift weight', 225, 35);

        ctx3.fillText('0.1 beat timing error across divisors', 400, 295);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Rhythm Detection — analytics</title>
    <script type="importmap">{
        "imports": {
            "dom/":      "https://cdn.jsdelivr.net/gh/stephband/dom@1.4.1/modules/",
            "fn/":       "https://cdn.jsdelivr.net/gh/stephband/fn@1.5.10/modules/",
            "midi/":     "https://cdn.jsdelivr.net/gh/stephband/midi@1.1.2/modules/",
            "sequence/": "https://cdn.jsdelivr.net/gh/soundio/sequence@0.2.27/"
        }
    }</script>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 4px;
        }
        .controls label { display: inline-block; margin: 4px 8px; }
        .controls button { margin: 0 4px; padding: 5px 12px; }
        .timeline {
            width: 100%;
            padding: 20px 0;
        }
        .graph-wrap {
            display: grid;
            margin-bottom: 16px;
        }
        .graph-wrap > * {
            grid-column: 1;
            grid-row: 1;
        }
        canvas {
            display: block;
            width: 100%;
        }
        .graph-data {
            justify-self: end;
            align-self: start;
            padding: 12px;
            text-align: left;
            min-width: 35rem;
        }
        .group {
            margin-bottom: 4px;
        }
        .group-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 1px;
        }
        .entry-line {
            font-size: 10px;
            white-space: nowrap;
            color: #bbb;
        }
        .entry-line.new-best     { color: #669944; }
        .entry-line.final-winner { color: #2d8800; font-weight: bold; }
        .info {
            justify-self: end;
            align-self: end;
            padding: 12px;
            font-size: 11px;
            min-width: 35rem;
        }
    </style>
</head>
<body>
    <h2>Rhythm Detection — analytics</h2>

    <div class="controls">
        <label>Events (beats):
            <input type="text" id="eventsInput" value="0.58" size="40">
        </label>
        <label>Start: <input type="number" id="startInput" value="0" step="0.1" style="width:55px"></label>
        <label>maxDuration: <input type="number" id="durationInput" value="4" step="0.5" style="width:55px"></label>
        <label>minDivision: <input type="number" id="minDivInput" value="0.0833" step="0.001" style="width:70px"></label>
        <label>maxDivision: <input type="number" id="maxDivInput" value="4" step="0.5" style="width:55px"></label>
        <br>
        <button onclick="update()">Update</button>
        <button onclick="preset([0, 0.667, 1.333],       '0, 0.667, 1.333')">Triplets</button>
        <button onclick="preset([0, 0.5, 1, 1.333, 1.667], '0, 0.5, 1, 1.333, 1.667')">Duplet+Triplet</button>
        <button onclick="preset([0, 0.5],  '0, 0.5')">Two Eighths</button>
        <label>Swing: <input type="range" id="swingInput" min="0" max="1" step="any" value="0.58" style="width:512px"></label>
    </div>

    <div class="timeline" id="columns"></div>

    <script type="module">
        import detectRhythm, { analytics } from '../modules/rhythm.js';

        const { cos, PI } = Math;

        // Restore beats from URL on load
        const urlBeats = new URLSearchParams(location.search).get('beats');
        const initBeats = urlBeats ?? '0.58';

        let events      = initBeats.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
        let startBeat   = 0;
        let maxDuration = 4;
        let minDivision = 1 / 12;
        let maxDivision = 4;

        document.getElementById('eventsInput').value = initBeats;
        document.getElementById('swingInput').value  = events.length === 1 ? events[0] : 0.58;

        function updateBeatsParam(str) {
            const url = new URL(location.href);
            url.searchParams.set('beats', str);
            history.replaceState(null, '', url);
        }

        window.preset = function(evts, str) {
            events = evts;
            document.getElementById('eventsInput').value = str;
            updateBeatsParam(str);
            draw();
        };

        document.getElementById('swingInput').addEventListener('input', function() {
            const beat = parseFloat(this.value);
            events = [beat];
            document.getElementById('eventsInput').value = beat;
            updateBeatsParam(beat);
            draw();
        });

        window.update = function() {
            const str   = document.getElementById('eventsInput').value;
            events      = str.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
            startBeat   = parseFloat(document.getElementById('startInput').value);
            maxDuration = parseFloat(document.getElementById('durationInput').value);
            minDivision = parseFloat(document.getElementById('minDivInput').value);
            maxDivision = parseFloat(document.getElementById('maxDivInput').value);
            updateBeatsParam(str);
            draw();
        };

        const BASE_W = 1920;
        const BASE_H = 640;

        function draw() {
            const container = document.getElementById('columns');
            container.innerHTML = '';

            // Build event array in the format detectRhythm expects
            const eventArray = events.map(b => [b, 'note', 60, 0.1, 0.25]);

            // Run the actual algorithm — populates analytics
            const result = detectRhythm(startBeat, maxDuration, eventArray, 0, { minDivision, maxDivision });

            if (!analytics.length) {
                container.innerHTML = '<em>No candidates scored.</em>';
                return;
            }

            // Index of the last isNewBest entry = final winner
            const finalIdx = analytics.reduce((fi, a, i) => a.isNewBest ? i : fi, -1);

            // Wrapper: canvas and data overlay share the same grid cell
            const wrap = document.createElement('div');
            wrap.className = 'graph-wrap';
            container.appendChild(wrap);

            // One canvas for all results
            const c = document.createElement('canvas');
            c.width  = BASE_W;
            c.height = BASE_H;
            wrap.appendChild(c);
            const cx = c.getContext('2d');

            cx.fillStyle = '#fafafa';
            cx.fillRect(0, 0, BASE_W, BASE_H);

            const midY = BASE_H / 2;

            // Amplitude ±1 lines — dotted
            cx.strokeStyle = '#aaa'; cx.lineWidth = 1;
            cx.setLineDash([1, 4]);
            cx.beginPath(); cx.moveTo(0, midY - 240); cx.lineTo(BASE_W, midY - 240); cx.stroke();
            cx.beginPath(); cx.moveTo(0, midY + 240); cx.lineTo(BASE_W, midY + 240); cx.stroke();
            cx.setLineDash([]);

            // Zero line — solid
            cx.strokeStyle = '#ccc'; cx.lineWidth = 1;
            cx.beginPath(); cx.moveTo(0, midY); cx.lineTo(BASE_W, midY); cx.stroke();

            // Pale blue rectangles, one per (beat, duration) window — stacks to
            // show analysis density; skip the full-width window (obvious from canvas size)
            cx.fillStyle = 'rgba(140, 175, 230, 0.06)';
            const seen = new Set();
            for (const a of analytics) {
                const key = `${ a.beat }:${ a.duration }`;
                if (seen.has(key)) continue;
                seen.add(key);
                const x0 = (a.beat - startBeat) / maxDuration * BASE_W;
                const w  = a.duration / maxDuration * BASE_W;
                if (Math.round(w) >= BASE_W) continue;
                cx.fillRect(x0, 0, w, BASE_H);
            }

            // Draw all waveforms — winner last so it renders on top
            const sorted = analytics.map((a, idx) => ({ idx, a })).sort((a, b) =>
                a.idx === finalIdx ? 1 : b.idx === finalIdx ? -1 : 0
            );

            for (const { idx, a } of sorted) {
                const isFinal   = idx === finalIdx;
                const isNewBest = a.isNewBest;

                // x range for this entry's window within the full canvas
                const x0 = (a.beat - startBeat) / maxDuration * BASE_W;
                const x1 = (a.beat - startBeat + a.duration) / maxDuration * BASE_W;
                const w  = x1 - x0;

                const amp = a.score * 240;

                cx.strokeStyle = isFinal ? '#226600' : isNewBest ? '#558833' : '#bbb';
                cx.lineWidth   = isFinal ? 2.5 : 1;
                cx.beginPath();
                for (let x = 0; x <= Math.ceil(w); x++) {
                    const phi = 2 * PI * a.divisor * x / w - a.phase;
                    const y   = midY - cos(phi) * amp;
                    x === 0 ? cx.moveTo(x0 + x, y) : cx.lineTo(x0 + x, y);
                }
                cx.stroke();
            }

            // Beat grid — dotted lines every 0.25 beats, darker on integers
            cx.lineWidth = 1;
            cx.setLineDash([4, 4]);
            for (let b = startBeat + 0.25; b < startBeat + maxDuration; b += 0.25) {
                const isInteger = Math.abs(b - Math.round(b)) < 0.001;
                cx.strokeStyle  = isInteger ? '#aaa' : '#ddd';
                const x = (b - startBeat) / maxDuration * BASE_W;
                cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, BASE_H); cx.stroke();
            }
            cx.setLineDash([]);

            // Beat labels at integer positions along the bottom
            cx.fillStyle    = '#bbb';
            cx.font         = '14.72px monospace';
            cx.textAlign    = 'left';
            cx.textBaseline = 'bottom';
            for (let b = startBeat; b <= startBeat + maxDuration; b++) {
                const x = (b - startBeat) / maxDuration * BASE_W;
                cx.fillText(`${ b }`, x + 4, BASE_H - 4);
            }

            // Event markers — solid blue
            cx.strokeStyle = '#0044cc';
            cx.lineWidth   = 1.5;
            for (const eb of events) {
                const x = (eb - startBeat) / maxDuration * BASE_W;
                cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, BASE_H); cx.stroke();
            }

            // Data lines as HTML, grouped by (beat, duration), overlaid right-aligned
            const groups = [];
            const groupKey = new Map();
            for (let idx = 0; idx < analytics.length; idx++) {
                const a   = analytics[idx];
                const key = `${ a.beat }:${ a.duration }`;
                if (!groupKey.has(key)) {
                    groupKey.set(key, groups.length);
                    groups.push({ beat: a.beat, duration: a.duration, entries: [] });
                }
                groups[groupKey.get(key)].entries.push({ idx, a });
            }

            const dataEl = document.createElement('div');
            dataEl.className = 'graph-data';

            for (const group of groups) {
                const groupEl = document.createElement('div');
                groupEl.className = 'group';

                const label = document.createElement('div');
                label.className   = 'group-label';
                label.textContent = `beat=${ group.beat }  duration=${ group.duration }`;
                groupEl.appendChild(label);

                for (const { idx, a } of group.entries) {
                    const isFinal   = idx === finalIdx;
                    const isNewBest = a.isNewBest;
                    const status    = isFinal ? '★' : isNewBest ? '↑' : '✗';
                    const rhythm    = a.rhythm.toString(2).padStart(a.divisor, '0');
                    const line      = document.createElement('div');
                    line.className  = 'entry-line' + (isFinal ? ' final-winner' : isNewBest ? ' new-best' : '');
                    line.textContent = `${ status }  div=${ a.divisor }  rhythm=${ rhythm }  r=${ a.r.toFixed(3) }  i=${ a.i.toFixed(3) }  amp=${ a.amplitude.toFixed(3) }  phase=${ a.phase.toFixed(3) }  drift=${ a.drift.toFixed(3) }  score=${ a.score.toFixed(3) }`;
                    groupEl.appendChild(line);
                }

                dataEl.appendChild(groupEl);
            }

            wrap.appendChild(dataEl);

            // Final result — bottom right of canvas
            const resultEl = document.createElement('div');
            resultEl.className = 'info';
            resultEl.innerHTML =
                `<strong>beat=${ result.beat }  duration=${ result.duration }  divisor=${ result.divisor }</strong><br>` +
                `rhythm=${ result.rhythm }  drift=${ result.drift?.toFixed(4) }  count=${ result.count }  index=${ result.index }`;
            wrap.appendChild(resultEl);
        }

        draw();
    </script>
</body>
</html>
